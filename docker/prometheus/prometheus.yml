# Prometheus scrape config for the streaming dashboard.
# The exporter (energy_pipeline.dashboard_export) runs on the host and serves
# /metrics on :8000; host.docker.internal lets the container reach it.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: energy-pipeline-exporter
    static_configs:
      - targets: ["host.docker.internal:8000"]
